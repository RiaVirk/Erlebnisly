<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
  <defs>
    <linearGradient id="sunset-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4D00" />
      <stop offset="50%" stop-color="#E0006C" />
      <stop offset="100%" stop-color="#660099" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Midnight Slate Background -->
  <rect width="1024" height="1024" fill="#051424" />

  <!-- Abstract Organic Mountain Shape with Minimal Padding -->
  <path 
    d="M 64 896 
       C 200 896, 250 600, 384 448 
       C 480 338, 540 180, 640 256 
       C 750 340, 800 650, 960 896 
       Z" 
    fill="url(#sunset-gradient)" 
    filter="url(#glow)" 
    opacity="0.85" 
  />

  <!-- Secondary Flowing Layer -->
  <path 
    d="M 64 896 
       C 300 896, 400 700, 512 640 
       C 650 560, 750 750, 960 896 
       Z" 
    fill="url(#sunset-gradient)" 
  />
  
  <!-- Foreground Accent Wave -->
  <path 
    d="M 64 896
       C 400 896, 500 820, 600 850
       C 700 880, 850 896, 960 896
       Z"
    fill="#051424"
    opacity="0.4"
  />
</svg>
